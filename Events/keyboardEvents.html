<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            margin-top: 10rem;
            background-color: #000000;
        }
        p{
            background-color: azure;
            
        }
    </style>
</head>
<body>
    <div>
        <input type="text" id="myInput" placeholder="Type something...">
        <div class="output">
            <p class="keyPressed">Key Pressed:</p>
            <p class="keyCode">Key Code:</p>
            <p class="charCode">Char Code:</p>
            <p class="eventType">Key Type:</p>
        </div>
    </div>
    <script>
        const handleKeyPress = (event) => {
            console.log(event);
            // display information about the keyboard event in the console
            console.log("Key pressed:", event.key);
            console.log("Key code:", event.code);
            console.log("Key type:", event.type);

            document.querySelector(
                ".keyPressed"
            ).textContent = `Key Pressed: ${event.key}`;

            document.querySelector(
                ".keyCode"
            ).textContent = `Key Code: ${event.code}`;

            document.querySelector(
                ".charCode"
            ).textContent = `Char Code: ${event.key.charCodeAt(0)}`;

            document.querySelector(
                ".eventType"
            ).textContent = `Key Type: ${event.type}`;
        };

        // get the input element by its ID
        var myInput = document.getElementById('myInput');
        myInput.addEventListener("keydown",handleKeyPress)
    </script>
</body>
</html>
