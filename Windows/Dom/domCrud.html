<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />

    <!--* CSS CODE -->
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <!-- it's a comment node  -->
  <body>
    <div>
      <h1>Simple DOM Todo App</h1>
      <input type="text" id="inputField" />
      <button class="btn">click me</button>
      <div class="todoListsElem">
      </div>
    </div>

    <!--* SCRIPT CODE -->
    <script>
      let inputElement = document.getElementById("inputField");
      let clickBtn = document.querySelector(".btn")
      let todoElement = document.querySelector(".todoListsElem");
      
      const addTodo = () => {
        console.log(inputElement.value);
        //todoElement.textContent = inputElement.value;
        let pElem = document.createElement("p");
        pElem.textContent = inputElement.value;
        todoElement.append(pElem);

        inputElement.value = "";
      }

      clickBtn.addEventListener('click', () => {
        addTodo();
      });

      todoElement.addEventListener('click', (event) => {
        console.log(event.target);
        let currentElem = event.target;
        currentElem.remove();
      });


    </script>
  </body>
</html>
